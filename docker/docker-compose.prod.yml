# IAnoIE Production Docker Compose
# Use with: docker compose -f docker/docker-compose.prod.yml up -d
# Install via: curl -fsSL https://raw.githubusercontent.com/proage-desenvolvimento/IAnoIE/main/scripts/install.sh | bash

services:
  postgres:
    image: postgres:16-alpine
    container_name: ianoie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ianoie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ianoie}
    volumes:
      - ianoie-postgres:/var/lib/postgresql/data
    networks:
      - ianoie-proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ianoie}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: ianoie-redis
    restart: unless-stopped
    volumes:
      - ianoie-redis:/data
    networks:
      - ianoie-proxy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    image: ${API_IMAGE:-ghcr.io/proage-desenvolvimento/ianoie-api:latest}
    container_name: ianoie-api
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TEMPLATES_HOST_PATH:-/opt/ianoie/templates}:/app/templates:ro
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - TEMPLATES_DIR=/app/templates
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@ianoie.local}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      - GPU_POLL_INTERVAL_SECONDS=${GPU_POLL_INTERVAL_SECONDS:-60}
      - GPU_METRICS_RETENTION_DAYS=${GPU_METRICS_RETENTION_DAYS:-7}
    networks:
      - ianoie-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ianoie-api.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.ianoie-api.entrypoints=web"
      - "traefik.http.services.ianoie-api.loadbalancer.server.port=8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    image: ${API_IMAGE:-ghcr.io/proage-desenvolvimento/ianoie-api:latest}
    container_name: ianoie-worker
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "ianoie.workers.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
      ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TEMPLATES_HOST_PATH:-/opt/ianoie/templates}:/app/templates:ro
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - TEMPLATES_DIR=/app/templates
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    networks:
      - ianoie-proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  beat:
    image: ${API_IMAGE:-ghcr.io/proage-desenvolvimento/ianoie-api:latest}
    container_name: ianoie-beat
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "ianoie.workers.celery_app:celery_app",
        "beat",
        "--loglevel=info",
      ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-ianoie}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ianoie}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    networks:
      - ianoie-proxy
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/proage-desenvolvimento/ianoie-frontend:latest}
    container_name: ianoie-frontend
    restart: unless-stopped
    networks:
      - ianoie-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ianoie-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ianoie-frontend.entrypoints=web"
      - "traefik.http.routers.ianoie-frontend.priority=1"
      - "traefik.http.services.ianoie-frontend.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  traefik:
    image: traefik:v3.6
    container_name: ianoie-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=ianoie-proxy"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ianoie-proxy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  ianoie-postgres:
  ianoie-redis:

networks:
  ianoie-proxy:
    external: true
