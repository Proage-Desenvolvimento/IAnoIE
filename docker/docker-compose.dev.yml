services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend/src/ianoie:/app/src/ianoie
      - /var/run/docker.sock:/var/run/docker.sock
      - ../templates:/app/templates:ro
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://ianoie:ianoie@postgres:5432/ianoie
      - DATABASE_URL_SYNC=postgresql+psycopg2://ianoie:ianoie@postgres:5432/ianoie
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    command: ["uvicorn", "ianoie.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    volumes:
      - ../backend/src/ianoie:/app/src/ianoie
      - /var/run/docker.sock:/var/run/docker.sock
      - ../templates:/app/templates:ro
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://ianoie:ianoie@postgres:5432/ianoie
      - DATABASE_URL_SYNC=postgresql+psycopg2://ianoie:ianoie@postgres:5432/ianoie
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ../.env
    command:
      [
        "celery",
        "-A",
        "ianoie.workers.celery_app:celery_app",
        "worker",
        "--loglevel=debug",
        "--concurrency=2",
      ]
