$schema: "ianoie-template/v1"

metadata:
  name: "Triton Inference Server"
  slug: "triton-inference"
  version: "1.0.0"
  description: "NVIDIA's high-performance inference server"
  category: "inference"
  icon: "Server"
  tags: ["triton", "inference", "nvidia", "serving"]

gpu:
  required: true
  min_count: 1
  max_count: 8
  min_vram_gb: 16

config:
  - key: "gpu_index"
    label: "GPU Assignment"
    type: "select"
    default: 0
    required: true
    options: [0, 1, 2, 3, 4, 5, 6, 7]
    description: "Which GPU to use"

  - key: "model_repository"
    label: "Model Repository Path"
    type: "string"
    default: "/models"
    required: false
    description: "Path to model repository inside container"

services:
  triton:
    image: "nvcr.io/nvidia/tritonserver"
    tag: "24.01-py3"
    internal: false

    environment:
      NVIDIA_VISIBLE_DEVICES: "all"

    ports:
      - container_port: 8000
        host_port: null
        protocol: "tcp"
        expose: true
      - container_port: 8001
        host_port: null
        protocol: "tcp"
        expose: true
      - container_port: 8002
        host_port: null
        protocol: "tcp"
        expose: true

    volumes:
      - name: "triton-models"
        mount_path: "/models"
        mode: "rw"

    gpu:
      enabled: true
      count: 1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30
      timeout: 10
      retries: 5
      start_period: 120

    restart: "unless-stopped"
