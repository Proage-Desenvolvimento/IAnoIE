$schema: "ianoie-template/v1"

metadata:
  name: "JupyterLab"
  slug: "jupyterlab"
  version: "1.0.0"
  description: "Interactive notebook environment with GPU support"
  category: "notebook"
  icon: "BookOpen"
  tags: ["notebook", "jupyter", "datascience"]

gpu:
  required: false
  min_count: 1
  max_count: 4
  min_vram_gb: 8

config:
  - key: "gpu_index"
    label: "GPU Assignment"
    type: "select"
    default: 0
    required: false
    options: [0, 1, 2, 3, 4, 5, 6, 7]
    description: "Which GPU to use (optional)"

  - key: "password"
    label: "Jupyter Password"
    type: "string"
    default: "ianoie"
    required: true
    description: "Password for JupyterLab access"

services:
  jupyterlab:
    image: "jupyter/tensorflow-notebook"
    tag: "latest"
    internal: false

    environment:
      JUPYTER_TOKEN: "{{config.password}}"
      JUPYTER_ENABLE_LAB: "yes"
      NVIDIA_VISIBLE_DEVICES: "all"

    ports:
      - container_port: 8888
        host_port: null
        protocol: "tcp"
        expose: true

    volumes:
      - name: "jupyter-work"
        mount_path: "/home/jovyan/work"
        mode: "rw"

    gpu:
      enabled: true
      count: 1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30
      timeout: 10
      retries: 3
      start_period: 60

    restart: "unless-stopped"
